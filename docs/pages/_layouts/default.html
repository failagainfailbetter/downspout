<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/site.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}">
        <span class="brand-name">Downspout</span>
        <span class="brand-note">VST3 plugins</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ '/' | relative_url }}">Plugins</a>
        <a href="https://github.com/danja/downspout">GitHub</a>
        <a href="https://github.com/danja/downspout/releases">Releases</a>
      </nav>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>Downspout plugins are built with portable C++ cores and DPF wrappers.</p>
    </footer>
  </body>
</html>
